<title>柳柳塔羅 - 微光指引</title>
<style>
  :root {

  body {
    background: var(--背景漸層);
    font-family: 'PingFang TC', 'Microsoft JhengHei', serif;
    color: var(--深焦糖);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
    margin: 0;
    min-height: 100vh;
  }

  h1 { 
    color: var(--大地褐); 
    letter-spacing: 6px; 
    margin-bottom: 10px; 
    font-weight: 600;
  }
  
  .subtitle {
    color: var(--柔金);
    font-style: italic;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .draw-btn {
    background-color: white;
    color: var(--大地褐);
    border: 1px solid var(--柔金);
    padding: 15px 50px;
    font-size: 1.1rem;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 4px;
    box-shadow: 0 4px 15px rgba(200, 169, 110, 0.2);
    transition: 0.4s;
    margin-bottom: 40px;
    font-weight: bold;
  }
  .draw-btn:hover { 
    background-color: var(--琥珀光); 
    transform: translateY(-2px); 
    box-shadow: 0 6px 20px rgba(200, 169, 110, 0.4);
  }

  /* 牌陣區 */
  .spread {
    display: flex;
    gap: 35px;
    margin-bottom: 50px;
    flex-wrap: wrap;
    justify-content: center;
    perspective: 2000px;
  }

  .card-slot {
    width: 260px;
    height: 440px;
    text-align: center;
  }
  
  .slot-title {
    font-weight: bold;
    color: var(--柔金);
    margin-bottom: 15px;
    letter-spacing: 3px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 1px solid var(--柔金);
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  }

  /* 牌背：美麗的星空圖片 */
  .card-back {
    background-image: url('Gemini_Generated_Image_i571w8i571w8i571.jpg'); 
    background-size: cover;
    background-position: center;
    background-color: var(--暖光白);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 溫暖光芒牌面 */
  .card-front {
    background: white;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    box-shadow: inset 0 0 60px var(--琥珀光);
    overflow: hidden;
    position: relative;
  }
  
  .glow-effect {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(249, 241, 220, 0.8) 0%, transparent 60%);
    top: -50%;
    left: -50%;
    pointer-events: none;
  }

  .card-name { font-size: 1.8rem; font-weight: bold; color: var(--大地褐); margin-bottom: 12px; z-index: 1; text-align: center;}
  .card-status { font-size: 1rem; color: #a07850; margin-bottom: 15px; font-weight: bold; background: rgba(200, 169, 110, 0.15); padding: 4px 15px; border-radius: 15px; z-index: 1; }
  
  /* 強制關鍵字不換行 */
  .card-keyword { 
    font-size: 1rem; 
    color: var(--深焦糖); 
    font-style: italic; 
    z-index: 1; 
    text-align: center;
    white-space: nowrap; 
  }

  /* 六大領域解析區 */
  .result-area {
    width: 100%;
    max-width: 1050px;
    background: white;
    padding: 45px 35px;
    border-radius: 12px;
    border: 1px solid var(--柔金);
    box-shadow: 0 10px 40px rgba(122, 92, 58, 0.08);
    display: none;
    animation: fadeIn 1.2s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .aspect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }

  .aspect-item {
    background: rgba(253, 250, 245, 0.7);
    padding: 30px 25px;
    border-radius: 8px;
    border-top: 4px solid var(--柔金);
    text-align: left;
    transition: 0.3s;
  }
  .aspect-item:hover {
    background: white;
    box-shadow: 0 5px 20px rgba(0,0,0,0.04);
  }
  
  .aspect-label { 
    font-size: 1.25rem; 
    font-weight: bold; 
    color: var(--大地褐); 
    margin-bottom: 20px; 
    border-bottom: 1px dashed var(--柔金);
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-interpretation {
    margin-bottom: 18px;
    line-height: 1.8;
    font-size: 1.05rem;
    color: var(--深焦糖);
  }
  .card-interpretation:last-child {
    margin-bottom: 0;
  }
  .card-title {
    font-weight: bold;
    color: var(--大地褐);
  }

  /* 細分項目的樣式 */
  .sub-aspect-box {
    margin-top: 8px;
    padding-left: 12px;
    border-left: 2px solid var(--柔金);
    font-size: 0.98rem;
    color: var(--深焦糖);
  }
  .sub-aspect-item {
    margin-bottom: 6px;
  }
  .sub-aspect-item b {
    color: #a07850;
  }

  /* 溫馨提醒區塊 */
  .footer-note {
    margin-top: 60px;
    padding: 25px;
    font-size: 0.95rem;
    color: #a07850;
    text-align: center;
    border-top: 1px dashed var(--柔金);
    max-width: 800px;
    line-height: 1.8;
    background: rgba(253, 250, 245, 0.5);
    border-radius: 8px;
  }

  @media (max-width: 800px) {
    .aspect-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

權杖五|競爭、混亂|內耗、惡性競爭|內部競爭激烈或腦力激盪頻繁，雖然混亂但充滿活力。|惡性競爭、內耗嚴重，團隊因無謂的爭吵而原地踏步。|在競爭中脫穎而出，職場挑戰大。|陷入職場派系鬥爭，無謂的內耗導致升遷受阻。|應徵人數多、競爭激烈；適合在壓力與挑戰中激發個人潛能的環境。|陷入惡性競爭或職場內耗；面試過程充滿火藥味，團隊合作難產。|參與競賽能進步，同儕激發潛能。|學習環境競爭過於病態，導致心理壓力過大。|財富在競爭中獲得，需精算損益。|因法律糾紛或財務爭議導致金錢損失。|運動量大，注意肌肉酸痛。|注意突發性外傷、發燒或因壓力引發的炎症。|競爭是為了進步，而非單純的爭吵。|遠離無意義的爭辯，將精力集中在真正的目標上。|追求者眾多或競爭激烈；在社交場合中非常活躍，雖然有些紛擾但充滿火氣。|惡性競爭、內耗嚴重；追求者之間火藥味重，或自身陷於人際混亂。|成員間常有小吵嘴或腦力激盪；氣氛雖然吵鬧，但能激發大家的活力。|瑣事爭吵、內耗嚴重；家人間因小事鬥嘴，團隊合作完全失靈。|腦力激盪與健康競爭；雖然成員間常有辯論，但能激發大家的創意與活力。|惡性競爭、內耗嚴重；朋友圈中充滿無謂的小爭執與摩擦，能量混亂。

權杖七|防禦、勇氣|瓦解、退縮|面對同業挑戰或競爭壓力，公司/部門展現出強大的捍衛意志(據理力爭，守住自己的專業底線)。|意志瓦解、退縮逃避，無法應對外部的競爭與壓力。|排除萬難守住地位，獲得上級信任。|職場壓力超出負荷，面臨競爭對手挑戰時選擇放棄。|面對強勁競爭對手，需展現強大的捍衛意志與獨特性來守住機會。|意志力瓦解，在競爭中退縮；無法應對高壓的面試或職務挑戰。|克服高難度科目，在壓力中進步。|學習難度過大，意志力崩潰，產生厭學情緒。|守住財產不流失，適合保守理財。|財務門戶大開，無法守住財富，容易有破財之虞。|腎上腺素激增，注意運動傷害。|慢性疲勞症候群，身心狀態極度緊繃。|堅持你的立場，黎明前的黑暗最難熬。|尋求支援，不要孤軍奮戰，適時退一步並非失敗。|守住自己的擇偶標準，雖然被多人追求或挑戰，但依然堅持自己的立場。|意志瓦解、退縮；面對情場競爭者時選擇逃避，不敢捍衛自己的愛情。|面對外部壓力（如鄰居糾紛、外界質疑），家人團結一致捍衛家庭利益。|意志瓦解、退縮；面對外部壓力（如鄰居、外戚）時，家人選擇逃避。|在團體中捍衛自己的觀點；展現勇氣與獨特性，雖然壓力大但能贏得敬重。|意志瓦解、退縮逃避；面對群體壓力或他人挑戰時，無法堅守立場。

      "逆位": { 
        關鍵字: parts[2], 
        事業_公司: parts[4], 事業_升遷: parts[6], 事業_求職: parts[8], 
        學業: parts[10], 財富: parts[12], 健康: parts[14], 注意事項: parts[16],
        感情_單身: parts[18], 感情_家庭: parts[20], 感情_人際: parts[22]
      }
    };
  }
});

// 定義六大領域
const aspects = [
  { key: "感情", icon: "🌸", title: "感情狀態" },
  { key: "健康", icon: "🌿", title: "身心健康" },
  { key: "事業", icon: "⭐", title: "事業發展" },
  { key: "財富", icon: "✨", title: "財富運勢" },
  { key: "學業", icon: "🔮", title: "學業成長" },
  { key: "注意事項", icon: "🌙", title: "宇宙叮嚀" }
];

// ==========================================
// 靈魂文字自動生成器 (含擴充細分架構)
// ==========================================
function getInterpretation(cardName, status, keyword, aspect) {
  const cardData = customTarotData[cardName];
  if (cardData && cardData[status]) {
    
    // 專屬排版：事業發展
    if (aspect === "事業" && cardData[status].事業_公司) {
       return `<div class="sub-aspect-box">
                <div class="sub-aspect-item"><b>✦ 公司/部門發展：</b>${cardData[status].事業_公司}</div>
                <div class="sub-aspect-item"><b>✦ 升遷：</b>${cardData[status].事業_升遷}</div>
                <div class="sub-aspect-item"><b>✦ 求職：</b>${cardData[status].事業_求職}</div>
               </div>`;
    }
    // 專屬排版：感情狀態
    if (aspect === "感情" && cardData[status].感情_單身) {
       return `<div class="sub-aspect-box">
                <div class="sub-aspect-item"><b>✦ 單身：</b>${cardData[status].感情_單身}</div>
                <div class="sub-aspect-item"><b>✦ 家庭：</b>${cardData[status].感情_家庭}</div>
                <div class="sub-aspect-item"><b>✦ 人際關係：</b>${cardData[status].感情_人際}</div>
               </div>`;
    }
    
    // 其他領域維持原狀
    if (cardData[status][aspect]) {
      return cardData[status][aspect];
    }
  }

  return "這股能量正在醞釀中，請靜心感受。";
}

async function drawCards() {
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('footerNote').style.display = 'none';

  // 確保重新抽牌時蓋上動畫流暢
  for(let i=0; i<3; i++) {
    const cardEl = document.getElementById(`card${i}`);
    if (cardEl) {
      cardEl.classList.remove('flipped');
    }
  }

  btn.innerText = "正在連結宇宙頻率...";
  await new Promise(r => setTimeout(r, 800));
  btn.innerText = "正在讀取當下的靈魂能量...";
  await new Promise(r => setTimeout(r, 800));
  btn.innerText = "✦ 已連結 ✦";

  // 直接從妳專屬的 78 張牌庫中洗牌
  let deckKeys = Object.keys(customTarotData);
  let shuffled = [...deckKeys].sort(() => 0.5 - Math.random());
  let drawnCards = shuffled.slice(0, 3);
  
  let results = [];

  drawnCards.forEach((cardName, index) => {
    const isReversed = Math.random() > 0.5;
    const status = isReversed ? "逆位" : "正位";
    const keyword = customTarotData[cardName][status].關鍵字;

    results.push({ name: cardName, status: status, keyword: keyword });

    document.getElementById(`front${index}`).innerHTML = `
      <div class="glow-effect"></div>
      <div class="card-name">${cardName}</div>
      <div class="card-status">${status}</div>
      <div class="card-keyword">『${keyword}』</div>
    `;

    setTimeout(() => { 
        const cardEl = document.getElementById(`card${index}`);
        cardEl.classList.add('flipped'); 
    }, index * 500 + 200);
  });

  setTimeout(() => {
    renderAspectResults(results);
    btn.innerText = "重新感應能量";
    btn.disabled = false;
    // 抽完牌後顯示溫馨提醒
    document.getElementById('footerNote').style.display = 'block';
  }, 2200);
}

function renderAspectResults(results) {
  const area = document.getElementById('resultArea');
  let html = `<div class="aspect-grid">`;

  // 這裡加入了妳要的三個小標題
  const subtitles = ["核心現況/主要能量", "潛意識/內在盲點", "未來導引/行動建議"];

  aspects.forEach(aspect => {
    html += `
      <div class="aspect-item">
        <div class="aspect-label">${aspect.icon} ${aspect.title}</div>
    `;
    
    // 在每一段解說的上方，自動印出對應的小標題
    results.forEach((card, index) => {
      const content = getInterpretation(card.name, card.status, card.keyword, aspect.key); 
      html += `
        <div class="card-interpretation">
          <div style="font-size: 0.95rem; color: #a07850; margin-bottom: 4px; font-weight: bold; letter-spacing: 1px;">
            ✦ ${subtitles[index]} ✦
          </div>
          <span class="card-title">${card.name}（${card.status}）：</span>${content}
        </div>
      `;
    });

    html += `</div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
  area.style.display = 'block';
}
</script>
