<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柳柳塔羅 - 微光指引</title>
<style>
  :root {
    --暖光白: #fdfaf5;
    --柔金: #c8a96e;
    --琥珀光: #f9f1dc;
    --粉褐: #e8d5cc;
    --大地褐: #7a5c3a;
    --深焦糖: #4a362d;
    --背景漸層: radial-gradient(circle at top center, #fdfaf5 0%, #f4eade 100%);
  }

  body {
    background: var(--背景漸層);
    font-family: 'PingFang TC', 'Microsoft JhengHei', serif;
    color: var(--深焦糖);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
    margin: 0;
    min-height: 100vh;
  }

  h1 { 
    color: var(--大地褐); 
    letter-spacing: 6px; 
    margin-bottom: 10px; 
    font-weight: 600;
  }
  
  .subtitle {
    color: var(--柔金);
    font-style: italic;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .draw-btn {
    background-color: white;
    color: var(--大地褐);
    border: 1px solid var(--柔金);
    padding: 15px 50px;
    font-size: 1.1rem;
    border-radius: 30px;
    cursor: pointer;
    letter-spacing: 4px;
    box-shadow: 0 4px 15px rgba(200, 169, 110, 0.2);
    transition: 0.4s;
    margin-bottom: 40px;
    font-weight: bold;
  }
  .draw-btn:hover { 
    background-color: var(--琥珀光); 
    transform: translateY(-2px); 
    box-shadow: 0 6px 20px rgba(200, 169, 110, 0.4);
  }

  /* 牌陣區 */
  .spread {
    display: flex;
    gap: 35px;
    margin-bottom: 50px;
    flex-wrap: wrap;
    justify-content: center;
    perspective: 2000px;
  }

  .card-slot {
    width: 260px;
    height: 440px;
    text-align: center;
  }
  
  .slot-title {
    font-weight: bold;
    color: var(--柔金);
    margin-bottom: 15px;
    letter-spacing: 3px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 1px solid var(--柔金);
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
  }

  /* 牌背：使用你專屬的柔美星空圖片 */
  .card-back {
    background-image: url('Gemini_Generated_Image_i571w8i571w8i571.jpg'); 
    background-size: cover;
    background-position: center;
    background-color: var(--暖光白);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-back::after {
    content: '✦';
    color: rgba(255, 255, 255, 0.5);
    font-size: 40px;
  }

  /* 溫暖光芒牌面 */
  .card-front {
    background: white;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    box-shadow: inset 0 0 60px var(--琥珀光);
    overflow: hidden;
    position: relative;
  }
  
  .glow-effect {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(249, 241, 220, 0.8) 0%, transparent 60%);
    top: -50%;
    left: -50%;
    pointer-events: none;
  }

  .card-name { font-size: 1.8rem; font-weight: bold; color: var(--大地褐); margin-bottom: 12px; z-index: 1; text-align: center;}
  .card-status { font-size: 1rem; color: #a07850; margin-bottom: 15px; font-weight: bold; background: rgba(200, 169, 110, 0.15); padding: 4px 15px; border-radius: 15px; z-index: 1; }
  
  /* 強制關鍵字不換行 */
  .card-keyword { 
    font-size: 1rem; 
    color: var(--深焦糖); 
    font-style: italic; 
    z-index: 1; 
    text-align: center;
    white-space: nowrap; 
  }

  /* 六大領域解析區 */
  .result-area {
    width: 100%;
    max-width: 1050px;
    background: white;
    padding: 45px 35px;
    border-radius: 12px;
    border: 1px solid var(--柔金);
    box-shadow: 0 10px 40px rgba(122, 92, 58, 0.08);
    display: none;
    animation: fadeIn 1.2s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .aspect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }

  .aspect-item {
    background: rgba(253, 250, 245, 0.7);
    padding: 30px 25px;
    border-radius: 8px;
    border-top: 4px solid var(--柔金);
    text-align: left;
    transition: 0.3s;
  }
  .aspect-item:hover {
    background: white;
    box-shadow: 0 5px 20px rgba(0,0,0,0.04);
  }
  
  .aspect-label { 
    font-size: 1.25rem; 
    font-weight: bold; 
    color: var(--大地褐); 
    margin-bottom: 20px; 
    border-bottom: 1px dashed var(--柔金);
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-interpretation {
    margin-bottom: 18px;
    line-height: 1.8;
    font-size: 1.05rem;
    color: var(--深焦糖);
  }
  .card-interpretation:last-child {
    margin-bottom: 0;
  }
  .card-title {
    font-weight: bold;
    color: var(--大地褐);
  }

  @media (max-width: 800px) {
    .aspect-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// 建立系統專用的資料庫結構
const customTarotData = {};
rawDatabase.trim().split('\n').forEach(line => {
  const parts = line.split('|');
  if (parts.length === 13) {
    customTarotData[parts[0]] = {
      "正位": { 關鍵字: parts[1], 事業: parts[3], 學業: parts[5], 財富: parts[7], 健康: parts[9], 注意事項: parts[11] },
      "逆位": { 關鍵字: parts[2], 事業: parts[4], 學業: parts[6], 財富: parts[8], 健康: parts[10], 注意事項: parts[12] }
    };
  }
});

// 定義六大領域
const aspects = [
  { key: "感情", icon: "🌸", title: "感情狀態" },
  { key: "健康", icon: "🌿", title: "身心健康" },
  { key: "事業", icon: "⭐", title: "事業發展" },
  { key: "財富", icon: "✨", title: "財富運勢" },
  { key: "學業", icon: "🔮", title: "學業成長" },
  { key: "注意事項", icon: "🌙", title: "宇宙叮嚀" }
];

// ==========================================
// 靈魂文字自動生成器 (防呆與擴展機制)
// ==========================================
function getInterpretation(cardName, status, keyword, aspect) {
  const cardData = customTarotData[cardName];
  if (cardData && cardData[status] && cardData[status][aspect]) {
    return cardData[status][aspect]; // 如果你有資料庫有這筆資料，優先使用你的心血
  }

  // 針對缺少「感情」的欄位，系統自動結合你設定的「關鍵字」生成溫暖的指引
  const templates = {
    "感情": `在關係的連結中，這股能量帶來了『${keyword}』的特質。${status==='正位' ? '順應這份流動，敞開心扉去感受當下的溫暖。' : '請留意內在的防衛或不安，先照顧好自己的心，不急於向外索求。'}`
  };
  return templates[aspect] || "這股能量正在醞釀中，請靜心感受。";
}

async function drawCards() {
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  document.getElementById('resultArea').style.display = 'none';

  // 確保重新抽牌時蓋上動畫流暢
  for(let i=0; i<3; i++) {
    const cardEl = document.getElementById(`card${i}`);
    if (cardEl) {
      cardEl.classList.remove('flipped');
    }
  }

  btn.innerText = "正在連結宇宙頻率...";
  await new Promise(r => setTimeout(r, 800));
  btn.innerText = "正在讀取當下的靈魂能量...";
  await new Promise(r => setTimeout(r, 800));
  btn.innerText = "✦ 已連結 ✦";

  // 直接從你專屬的 78 張牌庫中洗牌
  let deckKeys = Object.keys(customTarotData);
  let shuffled = [...deckKeys].sort(() => 0.5 - Math.random());
  let drawnCards = shuffled.slice(0, 3);
  
  let results = [];

  drawnCards.forEach((cardName, index) => {
    const isReversed = Math.random() > 0.5;
    const status = isReversed ? "逆位" : "正位";
    const keyword = customTarotData[cardName][status].關鍵字;

    results.push({ name: cardName, status: status, keyword: keyword });

    document.getElementById(`front${index}`).innerHTML = `
      <div class="glow-effect"></div>
      <div class="card-name">${cardName}</div>
      <div class="card-status">${status}</div>
      <div class="card-keyword">『${keyword}』</div>
    `;

    setTimeout(() => { 
        const cardEl = document.getElementById(`card${index}`);
        cardEl.classList.add('flipped'); 
    }, index * 500 + 200);
  });

  setTimeout(() => {
    renderAspectResults(results);
    btn.innerText = "重新感應能量";
    btn.disabled = false;
  }, 2200);
}

function renderAspectResults(results) {
  const area = document.getElementById('resultArea');
  let html = `<div class="aspect-grid">`;

  // ✨ 這裡加入了妳要的三個小標題 ✨
  const subtitles = ["核心現況", "潛意識/內在盲點", "未來導引/行動建議"];

  aspects.forEach(aspect => {
    html += `
      <div class="aspect-item">
        <div class="aspect-label">${aspect.icon} ${aspect.title}</div>
    `;
    
    // ✨ 在每一段解說的上方，自動印出對應的小標題 ✨
    results.forEach((card, index) => {
      const content = getInterpretation(card.name, card.status, card.keyword, aspect.key); 
      html += `
        <div class="card-interpretation">
          <div style="font-size: 0.95rem; color: #a07850; margin-bottom: 4px; font-weight: bold; letter-spacing: 1px;">
            ✦ ${subtitles[index]} ✦
          </div>
          <span class="card-title">${card.name}（${card.status}）：</span>${content}
        </div>
      `;
    });

    html += `</div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
  area.style.display = 'block';
}
</script>
